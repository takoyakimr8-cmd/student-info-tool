<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>生徒情報共有ツール</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root{--ink:#2b2b28;--paper:#faf7f0;--line:#d8d2c2;--accent:#a6402f;--accent-soft:#f1e3d8;--mono:"Courier New",monospace;--muted:#8a8478;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--paper);color:var(--ink);font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;}
#login{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;}
.card{background:#fff;border:1px solid var(--line);border-radius:8px;padding:36px;width:100%;max-width:340px;}
.card h1{font-size:1.2rem;margin-bottom:6px;}
.card p{font-size:0.8rem;color:var(--muted);margin-bottom:24px;}
.field{margin-bottom:14px;}
.field label{display:block;font-size:0.75rem;color:#777;margin-bottom:4px;}
.field input{width:100%;padding:9px 12px;border:1px solid var(--line);border-radius:4px;font-size:0.95rem;}
.btn-row{display:flex;gap:8px;margin-top:8px;}
.btn{flex:1;padding:10px;border:none;border-radius:4px;cursor:pointer;font-size:0.9rem;}
.btn-p{background:var(--accent);color:#fff;}
.btn-s{background:#fff;color:var(--accent);border:1px solid var(--accent);}
.err{color:#b33;font-size:0.8rem;margin-top:8px;min-height:18px;}
#app{display:none;padding-top:68px;}
.bar{position:fixed;top:0;left:0;right:0;background:#fff;border-bottom:1px solid var(--line);padding:0 16px;z-index:100;}
.bar-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;}
.bar-row span{font-size:0.8rem;color:var(--muted);}
.saved{color:#4a8a4a;}
.bar-btns{display:flex;gap:6px;}
.smbtn{font-size:0.75rem;padding:4px 10px;border-radius:4px;cursor:pointer;border:1px solid var(--line);background:#fff;}
.smbtn.red{color:var(--accent);border-color:var(--accent);}
.wrap{max-width:860px;margin:0 auto;padding:20px 16px 80px;}
.panel{background:#fff;border:1px solid var(--line);border-radius:6px;padding:20px;margin-bottom:20px;}
.panel h2{font-size:0.95rem;margin-bottom:14px;color:var(--accent);}
.hint{font-size:0.78rem;color:var(--muted);margin:-8px 0 14px;}
form.ff{display:flex;gap:10px;flex-wrap:wrap;align-items:end;}
.f{display:flex;flex-direction:column;gap:4px;}
.f label{font-size:0.75rem;color:#777;}
.f input,.f select,.f textarea{padding:8px 10px;border:1px solid var(--line);border-radius:4px;font-size:0.9rem;width:140px;font-family:inherit;}
.f textarea{resize:vertical;min-height:44px;}
button{background:var(--accent);color:#fff;border:none;padding:9px 16px;border-radius:4px;cursor:pointer;font-size:0.9rem;}
button.sec{background:#fff;color:var(--accent);border:1px solid var(--accent);}
button.ghost{background:transparent;color:var(--ink);border:1px solid var(--line);padding:4px 10px;font-size:0.78rem;}
button.del{background:transparent;color:#b33;border:1px solid #e3c3c3;padding:4px 10px;font-size:0.8rem;}
button.quit{background:transparent;color:#c07000;border:1px solid #e8d5b0;padding:4px 10px;font-size:0.8rem;}
button.rev{background:transparent;color:#4a8a4a;border:1px solid #b3d9b3;padding:4px 10px;font-size:0.78rem;}
table{width:100%;border-collapse:collapse;margin-top:16px;}
th,td{text-align:left;padding:8px 6px;border-bottom:1px solid var(--line);font-size:0.85rem;}
th{color:#777;font-weight:600;font-size:0.72rem;}
td.r,th.r{text-align:right;font-family:var(--mono);}
.empty{color:#999;font-size:0.85rem;padding:14px 0;}
.grid2{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;}
.stat{background:var(--accent-soft);border-radius:6px;padding:14px;}
.stat .lbl{font-size:0.75rem;color:#7a5142;}
.stat .val{font-size:1.4rem;font-family:var(--mono);margin-top:4px;}
.wrow{display:flex;align-items:center;gap:8px;margin-top:12px;font-size:0.85rem;color:#666;flex-wrap:wrap;}
.wrow input{width:60px;padding:4px 6px;border:1px solid var(--line);border-radius:4px;}
.drow td{background:#fbf8f2;padding:16px;border-bottom:2px solid var(--line);}
.dgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px;margin-bottom:14px;}
.dgrid .f{width:100%;}
.dgrid .f input,.dgrid .f textarea{width:100%;}
.sec-lbl{font-size:0.78rem;color:var(--muted);margin:14px 0 4px;font-weight:600;}
.nadd{display:flex;gap:8px;align-items:end;flex-wrap:wrap;margin-top:8px;}
.nadd .f input{width:110px;}
.ntbl{width:100%;font-size:0.8rem;margin-top:6px;}
.ntbl th,.ntbl td{padding:5px 4px;}
.gap-box{margin-top:14px;font-size:0.88rem;background:var(--accent-soft);border-radius:6px;padding:12px 14px;}
.du{color:#4a8a4a;font-size:0.78rem;}
.dd{color:#b33;font-size:0.78rem;}
.deq{color:#aaa;font-size:0.78rem;}
details.panel summary{cursor:pointer;font-size:0.95rem;color:var(--accent);font-weight:600;list-style:none;}
tr.ina td{color:#aaa;}
tr.ina td.nm{text-decoration:line-through;}
.chart-wrap{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:24px;}
.chart-lbl{font-size:0.78rem;color:var(--muted);margin-bottom:6px;text-align:center;}
</style>
</head>
<body>

<div id="login">
  <div class="card">
    <h1>生徒情報共有ツール</h1>
    <p>ログインしてください</p>
    <div class="field"><label>メールアドレス</label><input type="email" id="em" autocomplete="email"></div>
    <div class="field"><label>パスワード</label><input type="password" id="pw" autocomplete="current-password"></div>
    <div class="btn-row">
      <button class="btn btn-p" id="btnLogin">ログイン</button>
      <button class="btn btn-s" id="btnSignup">新規登録</button>
    </div>
    <div class="err" id="errMsg"></div>
  </div>
</div>

<div id="app">
  <div class="bar">
    <div class="bar-row">
      <span class="saved" id="saveStatus">—</span>
      <div class="bar-btns">
        <button class="smbtn" id="btnDl">📥 ダウンロード</button>
        <button class="smbtn red" id="btnLogout">ログアウト</button>
      </div>
    </div>
    <div style="font-size:0.72rem;color:var(--muted);padding-bottom:5px" id="userBar"></div>
  </div>

  <div class="wrap">
    <div class="panel">
      <h2>生徒を追加</h2>
      <form class="ff" id="addForm">
        <div class="f"><label>生徒名</label><input type="text" id="iName" required></div>
        <div class="f"><label>単価($)</label><input type="number" id="iFee" step="0.01" min="0" required></div>
        <div class="f"><label>時間(分)</label><input type="number" id="iMin" step="1" min="1" required></div>
        <div class="f"><label>月レッスン数</label><input type="number" id="iLes" step="1" min="0" value="8" required></div>
        <button type="submit">追加</button>
      </form>
    </div>

    <details class="panel" open>
      <summary>生徒一覧 <span id="badge" style="font-size:0.78rem;font-weight:normal;color:var(--muted)"></span></summary>
      <table style="margin-top:14px">
        <thead><tr><th>名前</th><th class="r">単価</th><th class="r">分</th><th class="r">$/分</th><th class="r">月回数</th><th class="r">月額</th><th></th><th></th><th></th></tr></thead>
        <tbody id="rows"></tbody>
      </table>
      <p class="empty" id="emptyMsg">まだ生徒がいません。</p>
    </details>

    <div class="panel">
      <h2>収益サマリー</h2>
      <div class="grid2">
        <div class="stat"><div class="lbl">生徒数</div><div class="val" id="sCount">0</div></div>
        <div class="stat"><div class="lbl">月間合計</div><div class="val" id="sMon">$0</div></div>
        <div class="stat"><div class="lbl">平均単価</div><div class="val" id="sAvg">$0</div></div>
        <div class="stat"><div class="lbl">加重平均</div><div class="val" id="sWavg">$0</div></div>
      </div>
      <div class="wrow">週収(月÷<input type="number" id="iWeeks" value="4" step="0.1" min="1">週)=<strong id="sWeek">$0</strong></div>
    </div>

    <div class="panel">
      <h2>目標から逆算</h2>
      <p class="hint">もし1レッスン◯ドルで教えたら、目標達成に何人必要か比較します。</p>
      <form class="ff" id="goalForm">
        <div class="f"><label>目標金額</label><input type="number" id="gAmt" value="500"></div>
        <div class="f"><label>通貨</label><select id="gCur"><option value="USD">$ ドル</option><option value="JPY">¥ 円</option></select></div>
        <div class="f"><label>為替(1$=◯円)</label><input type="number" id="gRate" value="155"></div>
        <div class="f"><label>月標準レッスン数</label><input type="number" id="gLes" value="4"></div>
        <div class="f"><label>逆算する単価($)</label><input type="number" id="gFee" placeholder="例: 20"></div>
        <button type="button" id="btnGoal">更新</button>
      </form>
      <table><thead><tr><th class="r">単価</th><th class="r">必要人数</th><th class="r">月レッスン数</th></tr></thead><tbody id="gRows"></tbody></table>
      <div class="gap-box" id="gapBox"></div>
    </div>

    <div class="panel">
      <h2>月次記録</h2>
      <div style="display:flex;gap:10px;align-items:end;flex-wrap:wrap;margin-bottom:16px">
        <div class="f"><label>年月</label><input type="month" id="snapMonth"></div>
        <button id="btnSnap">今月を記録</button>
      </div>
      <table id="snapTable" style="display:none">
        <thead><tr><th>年月</th><th class="r">生徒数</th><th class="r">月収</th><th class="r">平均単価</th><th class="r">前月比 人数</th><th class="r">前月比 月収</th><th></th></tr></thead>
        <tbody id="snapRows"></tbody>
      </table>
      <p class="empty" id="snapEmpty">まだ記録がありません。</p>
      <div id="chartArea" style="display:none">
        <div class="chart-wrap">
          <div><div class="chart-lbl">月収推移($)</div><canvas id="chartRev" height="160"></canvas></div>
          <div><div class="chart-lbl">生徒数推移(名)</div><canvas id="chartCnt" height="160"></canvas></div>
        </div>
      </div>
    </div>

    <details class="panel">
      <summary>卒業・退会した生徒 (<span id="inaCount">0</span>名)</summary>
      <table style="margin-top:12px">
        <thead><tr><th>名前</th><th class="r">最終単価</th><th>退会日</th><th></th></tr></thead>
        <tbody id="inaRows"></tbody>
      </table>
      <p class="empty" id="inaEmpty">退会した生徒はいません。</p>
    </details>
  </div>
</div>

<script>
var fbApp = firebase.initializeApp({
  apiKey:"AIzaSyBNbOfcSIjgXuPXlDt5B2_ksUcBoCRlo8U",
  authDomain:"student-info-tool.firebaseapp.com",
  projectId:"student-info-tool",
  storageBucket:"student-info-tool.firebasestorage.app",
  messagingSenderId:"545050196777",
  appId:"1:545050196777:web:b03bcd194473c688d89538"
});
var fbAuth = firebase.auth();

var currentUid = null;
var students = [];
var snapshots = [];

function sk(t){ return 'sit:' + currentUid + ':' + t; }

function saveData(){
  if(!currentUid) return;
  localStorage.setItem(sk('students'), JSON.stringify(students));
  localStorage.setItem(sk('snapshots'), JSON.stringify(snapshots));
  localStorage.setItem(sk('goal'), JSON.stringify({
    amt: document.getElementById('gAmt').value,
    cur: document.getElementById('gCur').value,
    rate: document.getElementById('gRate').value,
    les: document.getElementById('gLes').value,
    fee: document.getElementById('gFee').value,
    weeks: document.getElementById('iWeeks').value
  }));
  var t = new Date().toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'});
  document.getElementById('saveStatus').textContent = '✓ 保存済み ' + t;
}

function loadData(){
  students = JSON.parse(localStorage.getItem(sk('students')) || '[]');
  snapshots = JSON.parse(localStorage.getItem(sk('snapshots')) || '[]');
  for(var i=0;i<students.length;i++){
    var s=students[i];
    if(!s.id) s.id='sid-'+Date.now()+'-'+i;
    if(!s.negotiations) s.negotiations=[];
    if(!s.status) s.status='active';
  }
  var g = JSON.parse(localStorage.getItem(sk('goal')) || 'null');
  if(g){
    if(g.amt) document.getElementById('gAmt').value=g.amt;
    if(g.cur) document.getElementById('gCur').value=g.cur;
    if(g.rate) document.getElementById('gRate').value=g.rate;
    if(g.les) document.getElementById('gLes').value=g.les;
    if(g.fee) document.getElementById('gFee').value=g.fee;
    if(g.weeks) document.getElementById('iWeeks').value=g.weeks;
  }
  render();
  renderSnaps();
}

function friendlyErr(code){
  var m = {
    'auth/user-not-found':'メールが見つかりません',
    'auth/wrong-password':'パスワードが違います',
    'auth/invalid-email':'メールの形式が違います',
    'auth/email-already-in-use':'このメールはすでに使われています',
    'auth/invalid-credential':'メールまたはパスワードが違います'
  };
  return m[code] || code;
}

document.getElementById('btnLogin').onclick = function(){
  var e = document.getElementById('em').value.trim();
  var p = document.getElementById('pw').value;
  document.getElementById('errMsg').textContent = '';
  fbAuth.signInWithEmailAndPassword(e, p).catch(function(er){
    document.getElementById('errMsg').textContent = friendlyErr(er.code);
  });
};

document.getElementById('btnSignup').onclick = function(){
  var e = document.getElementById('em').value.trim();
  var p = document.getElementById('pw').value;
  document.getElementById('errMsg').textContent = '';
  if(p.length < 6){
    document.getElementById('errMsg').textContent = 'パスワードは6文字以上';
    return;
  }
  fbAuth.createUserWithEmailAndPassword(e, p).catch(function(er){
    document.getElementById('errMsg').textContent = friendlyErr(er.code);
  });
};

document.getElementById('btnLogout').onclick = function(){ fbAuth.signOut(); };

fbAuth.onAuthStateChanged(function(user){
  if(!user){
    document.getElementById('login').style.display = 'flex';
    document.getElementById('app').style.display = 'none';
    currentUid = null;
    return;
  }
  currentUid = user.uid;
  document.getElementById('login').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.getElementById('userBar').textContent = 'ログイン中: ' + user.email;
  loadData();
});

document.getElementById('addForm').onsubmit = function(e){
  e.preventDefault();
  var name = document.getElementById('iName').value.trim();
  var fee = parseFloat(document.getElementById('iFee').value);
  var min = parseFloat(document.getElementById('iMin').value);
  var les = parseFloat(document.getElementById('iLes').value);
  if(!name || isNaN(fee) || isNaN(min) || isNaN(les)) return;
  students.push({
    id:'sid-'+Date.now(), name:name, fee:fee, minutes:min, lessons:les,
    country:'', dateStart:'', interests:'', occupation:'', curriculum:'',
    negotiations:[], status:'active'
  });
  e.target.reset();
  document.getElementById('iLes').value = 8;
  render();
};

document.getElementById('iWeeks').oninput = function(){ renderSummary(); saveData(); };

function esc(s){ return (s||'').replace(/[&<>]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;'}[c];}); }
function escA(s){ return (s||'').replace(/"/g,'&quot;'); }

var openD = {};
var editM = {};

function toggleD(id){ openD[id]=!openD[id]; renderRows(); }
function toggleE(id){ editM[id]=!editM[id]; renderRows(); }

function saveE(id){
  var s = null;
  for(var i=0;i<students.length;i++){ if(students[i].id===id){ s=students[i]; break; } }
  if(!s) return;
  var name = document.getElementById('en-'+id).value.trim();
  var fee = parseFloat(document.getElementById('ef-'+id).value);
  var min = parseFloat(document.getElementById('em-'+id).value);
  var les = parseFloat(document.getElementById('el-'+id).value);
  if(!name||isNaN(fee)||isNaN(min)||isNaN(les)) return;
  s.name=name; s.fee=fee; s.minutes=min; s.lessons=les;
  delete editM[id];
  render();
}

function cancelE(id){ delete editM[id]; renderRows(); }

function updF(id, f, v){
  for(var i=0;i<students.length;i++){
    if(students[i].id===id){ students[i][f]=v; break; }
  }
  saveData();
}

function quit(id){
  var s = null;
  for(var i=0;i<students.length;i++){ if(students[i].id===id){ s=students[i]; break; } }
  if(!s) return;
  if(!confirm(s.name + ' を退会済みにしますか？')) return;
  s.status = 'inactive';
  s.dateQuit = new Date().toISOString().slice(0,10);
  delete openD[id];
  render();
}

function reactiv(id){
  for(var i=0;i<students.length;i++){
    if(students[i].id===id){ students[i].status='active'; students[i].dateQuit=''; break; }
  }
  render();
}

function removeSt(id){
  students = students.filter(function(x){ return x.id!==id; });
  delete openD[id];
  render();
}

function addNeg(id){
  var s = null;
  for(var i=0;i<students.length;i++){ if(students[i].id===id){ s=students[i]; break; } }
  if(!s) return;
  var d = document.getElementById('nd-'+id).value;
  var fr = parseFloat(document.getElementById('nf-'+id).value);
  var to = parseFloat(document.getElementById('nt-'+id).value);
  var re = document.getElementById('nr-'+id).value.trim();
  if(!d||isNaN(fr)||isNaN(to)) return;
  s.negotiations.push({date:d, from:fr, to:to, reason:re});
  saveData();
  renderRows();
}

function removeNeg(id, idx){
  for(var i=0;i<students.length;i++){
    if(students[i].id===id){ students[i].negotiations.splice(idx,1); break; }
  }
  saveData();
  renderRows();
}

window._tD=toggleD; window._tE=toggleE; window._sE=saveE; window._cE=cancelE;
window._uF=updF; window._q=quit; window._rv=reactiv; window._rm=removeSt;
window._aN=addNeg; window._rN=removeNeg;

function renderRows(){
  var tbody = document.getElementById('rows');
  var active = students.filter(function(s){ return s.status!=='inactive'; });
  var inactive = students.filter(function(s){ return s.status==='inactive'; });
  document.getElementById('emptyMsg').style.display = active.length ? 'none' : 'block';
  tbody.innerHTML = '';

  for(var i=0; i<active.length; i++){
    var s = active[i];
    var mon = s.fee * s.lessons;
    var ppm = s.minutes ? s.fee/s.minutes : 0;
    var tr = document.createElement('tr');
    if(editM[s.id]){
      tr.innerHTML = '<td><input id="en-'+s.id+'" value="'+escA(s.name)+'" style="width:90px;padding:3px 6px;border:1px solid var(--accent);border-radius:4px;font-size:.85rem"></td>'
        +'<td class="r"><input id="ef-'+s.id+'" type="number" value="'+s.fee+'" style="width:64px;padding:3px 6px;border:1px solid var(--accent);border-radius:4px;font-size:.85rem"></td>'
        +'<td class="r"><input id="em-'+s.id+'" type="number" value="'+s.minutes+'" style="width:50px;padding:3px 6px;border:1px solid var(--accent);border-radius:4px;font-size:.85rem"></td>'
        +'<td class="r" style="color:#aaa">—</td>'
        +'<td class="r"><input id="el-'+s.id+'" type="number" value="'+s.lessons+'" style="width:50px;padding:3px 6px;border:1px solid var(--accent);border-radius:4px;font-size:.85rem"></td>'
        +'<td class="r" style="color:#aaa">—</td>'
        +'<td><button onclick="_sE(\''+s.id+'\')" style="background:#4a8a4a;color:#fff;border:none;padding:4px 10px;border-radius:4px;font-size:.78rem;cursor:pointer">保存</button></td>'
        +'<td><button class="ghost" onclick="_cE(\''+s.id+'\')">取消</button></td><td></td>';
    } else {
      tr.innerHTML = '<td>'+esc(s.name)+'</td>'
        +'<td class="r">'+s.fee.toFixed(2)+'</td>'
        +'<td class="r">'+s.minutes+'</td>'
        +'<td class="r">'+ppm.toFixed(2)+'</td>'
        +'<td class="r">'+s.lessons+'</td>'
        +'<td class="r">'+mon.toFixed(2)+'</td>'
        +'<td><button class="ghost" onclick="_tE(\''+s.id+'\')">編集</button></td>'
        +'<td><button class="ghost" onclick="_tD(\''+s.id+'\')">'+(openD[s.id]?'閉じる':'詳細')+'</button></td>'
        +'<td><button class="quit" onclick="_q(\''+s.id+'\')">辞めた</button></td>';
    }
    tbody.appendChild(tr);

    if(openD[s.id]){
      var dtr = document.createElement('tr');
      dtr.className = 'drow';
      var nRows = '';
      for(var j=0;j<s.negotiations.length;j++){
        var n = s.negotiations[j];
        nRows += '<tr><td>'+n.date+'</td><td class="r">$'+n.from.toFixed(2)+'</td><td class="r">$'+n.to.toFixed(2)+'</td>'
          +'<td style="font-size:.8rem;color:var(--muted)">'+esc(n.reason||'')+'</td>'
          +'<td><button class="ghost" onclick="_rN(\''+s.id+'\','+j+')">削除</button></td></tr>';
      }
      dtr.innerHTML = '<td colspan="9"><div class="dgrid">'
        +'<div class="f"><label>国籍</label><input type="text" value="'+escA(s.country)+'" onblur="_uF(\''+s.id+'\',\'country\',this.value)"></div>'
        +'<div class="f"><label>開始日</label><input type="date" value="'+s.dateStart+'" onblur="_uF(\''+s.id+'\',\'dateStart\',this.value)"></div>'
        +'<div class="f"><label>職業</label><input type="text" value="'+escA(s.occupation)+'" onblur="_uF(\''+s.id+'\',\'occupation\',this.value)"></div>'
        +'<div class="f" style="grid-column:1/-1"><label>興味・トピック</label><textarea onblur="_uF(\''+s.id+'\',\'interests\',this.value)">'+esc(s.interests)+'</textarea></div>'
        +'<div class="f" style="grid-column:1/-1"><label>カリキュラム</label><textarea onblur="_uF(\''+s.id+'\',\'curriculum\',this.value)">'+esc(s.curriculum)+'</textarea></div>'
        +'</div>'
        +'<div class="sec-lbl">価格交渉の履歴</div>'
        +(s.negotiations.length ? '<table class="ntbl"><thead><tr><th>日付</th><th class="r">変更前</th><th class="r">変更後</th><th>理由</th><th></th></tr></thead><tbody>'+nRows+'</tbody></table>' : '<p class="hint" style="margin:4px 0">まだ記録がありません。</p>')
        +'<div class="nadd">'
        +'<div class="f"><label>日付</label><input type="date" id="nd-'+s.id+'"></div>'
        +'<div class="f"><label>変更前($)</label><input type="number" step="0.01" id="nf-'+s.id+'"></div>'
        +'<div class="f"><label>変更後($)</label><input type="number" step="0.01" id="nt-'+s.id+'"></div>'
        +'<div class="f" style="flex:1;min-width:140px"><label>理由メモ</label><input type="text" id="nr-'+s.id+'"></div>'
        +'<button class="sec" onclick="_aN(\''+s.id+'\')">記録を追加</button>'
        +'</div></td>';
      tbody.appendChild(dtr);
    }
  }

  var inaEl = document.getElementById('inaRows');
  document.getElementById('inaCount').textContent = inactive.length;
  document.getElementById('inaEmpty').style.display = inactive.length ? 'none' : 'block';
  var inaHtml = '';
  for(var k=0;k<inactive.length;k++){
    var si = inactive[k];
    inaHtml += '<tr class="ina"><td class="nm">'+esc(si.name)+'</td><td class="r">$'+si.fee.toFixed(2)+'</td><td>'+(si.dateQuit||'—')+'</td>'
      +'<td><button class="rev" onclick="_rv(\''+si.id+'\')">復帰</button> <button class="del" onclick="_rm(\''+si.id+'\')">削除</button></td></tr>';
  }
  inaEl.innerHTML = inaHtml;
}

function renderSummary(){
  var ac = students.filter(function(s){ return s.status!=='inactive'; });
  var cnt = ac.length;
  var tot = 0, tl = 0, sumFee = 0;
  for(var i=0;i<ac.length;i++){ tot+=ac[i].fee*ac[i].lessons; tl+=ac[i].lessons; sumFee+=ac[i].fee; }
  var avg = cnt ? sumFee/cnt : 0;
  var wavg = tl ? tot/tl : 0;
  var weeks = parseFloat(document.getElementById('iWeeks').value) || 4;
  var wk = tot/weeks;
  document.getElementById('sCount').textContent = cnt;
  document.getElementById('sMon').textContent = '$'+tot.toFixed(2);
  document.getElementById('sAvg').textContent = '$'+avg.toFixed(2);
  document.getElementById('sWavg').textContent = '$'+wavg.toFixed(2);
  document.getElementById('sWeek').textContent = '$'+wk.toFixed(2);
  document.getElementById('badge').textContent = cnt+'名';
  return {cnt:cnt, tot:tot, avg:avg, wavg:wavg, wk:wk};
}

function renderGoal(){
  var amt = parseFloat(document.getElementById('gAmt').value) || 0;
  var cur = document.getElementById('gCur').value;
  var rate = parseFloat(document.getElementById('gRate').value) || 1;
  var target = cur==='JPY' ? amt/rate : amt;
  var les = parseFloat(document.getElementById('gLes').value) || 1;
  var ac = students.filter(function(s){ return s.status!=='inactive'; });
  var priceSet = {};
  for(var i=0;i<ac.length;i++){ priceSet[ac[i].fee]=1; }
  var prices = Object.keys(priceSet).map(Number).sort(function(a,b){return a-b;});
  var tb = document.getElementById('gRows');
  if(!prices.length){
    tb.innerHTML = '<tr><td colspan="3" style="color:#aaa;font-size:.82rem;padding:10px 0">生徒を追加すると表示されます</td></tr>';
    document.getElementById('gapBox').textContent = '';
    return;
  }
  var html = '';
  for(var j=0;j<prices.length;j++){
    var p = prices[j];
    var n = Math.ceil(target/(p*les));
    html += '<tr><td class="r">$'+p.toFixed(2)+'</td><td class="r">'+n+'人</td><td class="r">'+n*les+'</td></tr>';
  }
  tb.innerHTML = html;
  var sum = renderSummary();
  var gap = target - sum.tot;
  var fee = parseFloat(document.getElementById('gFee').value);
  var box = document.getElementById('gapBox');
  if(gap<=0){ box.textContent='目標達成しています！'; }
  else if(!isNaN(fee)&&fee>0){ box.textContent='目標まであと $'+gap.toFixed(2)+'。$'+fee.toFixed(2)+' の生徒があと'+Math.ceil(gap/(fee*les))+'人いれば達成です。'; }
  else{ box.textContent='目標まであと $'+gap.toFixed(2)+'。'; }
}

document.getElementById('btnGoal').onclick = function(){ renderGoal(); saveData(); };

var nowDate = new Date();
document.getElementById('snapMonth').value = nowDate.getFullYear()+'-'+String(nowDate.getMonth()+1).padStart(2,'0');

document.getElementById('btnSnap').onclick = function(){
  var month = document.getElementById('snapMonth').value;
  if(!month) return;
  var idx = -1;
  for(var i=0;i<snapshots.length;i++){ if(snapshots[i].month===month){ idx=i; break; } }
  if(idx!==-1 && !confirm(month+' の記録が既にあります。上書きしますか？')) return;
  var ac = students.filter(function(s){ return s.status!=='inactive'; });
  var cnt=ac.length, tot=0, tl=0, sumFee=0;
  for(var j=0;j<ac.length;j++){ tot+=ac[j].fee*ac[j].lessons; tl+=ac[j].lessons; sumFee+=ac[j].fee; }
  var avg=cnt?sumFee/cnt:0, wavg=tl?tot/tl:0;
  var snap = {month:month, count:cnt, totalMonthly:tot, avgFee:avg, wAvgFee:wavg};
  if(idx!==-1) snapshots[idx]=snap; else snapshots.push(snap);
  snapshots.sort(function(a,b){ return b.month.localeCompare(a.month); });
  saveData();
  renderSnaps();
  document.getElementById('saveStatus').textContent='✓ '+month+' の記録を保存しました';
};

window._delSnap = function(m){
  snapshots = snapshots.filter(function(s){ return s.month!==m; });
  saveData();
  renderSnaps();
};

function diff(a, b, pre, dec){
  if(b===undefined||b===null) return '<span class="deq">—</span>';
  var d=a-b, sg=d>0?'+':'';
  return '<span class="'+(d>0?'du':d<0?'dd':'deq')+'">'+sg+pre+d.toFixed(dec)+'</span>';
}

var cRev=null, cCnt=null;

function renderSnaps(){
  var tb = document.getElementById('snapRows');
  var emp = document.getElementById('snapEmpty');
  var tbl = document.getElementById('snapTable');
  var area = document.getElementById('chartArea');
  if(!snapshots.length){
    tbl.style.display='none'; emp.style.display='block'; area.style.display='none';
    return;
  }
  tbl.style.display=''; emp.style.display='none';
  var html='';
  for(var i=0;i<snapshots.length;i++){
    var s=snapshots[i], p=snapshots[i+1];
    html+='<tr>'
      +'<td style="font-size:.82rem;color:var(--muted)">'+s.month+'</td>'
      +'<td class="r">'+s.count+'名</td>'
      +'<td class="r">$'+s.totalMonthly.toFixed(2)+'</td>'
      +'<td class="r">$'+s.avgFee.toFixed(2)+'</td>'
      +'<td class="r">'+diff(s.count,p?p.count:undefined,'',0)+'</td>'
      +'<td class="r">'+diff(s.totalMonthly,p?p.totalMonthly:undefined,'$',2)+'</td>'
      +'<td><button class="ghost" onclick="_delSnap(\''+s.month+'\')">削除</button></td>'
      +'</tr>';
  }
  tb.innerHTML=html;
  area.style.display='';
  var ord=[].concat(snapshots).reverse();
  var labels=[], revs=[], cnts=[];
  for(var k=0;k<ord.length;k++){ labels.push(ord[k].month); revs.push(ord[k].totalMonthly); cnts.push(ord[k].count); }
  function bc(d){ return d.map(function(v,i){ return i===0?'rgba(166,64,47,0.6)':v>d[i-1]?'rgba(74,138,74,0.7)':v<d[i-1]?'rgba(179,51,51,0.7)':'rgba(166,64,47,0.4)'; }); }
  function bbc(d){ return d.map(function(v,i){ return i===0?'#a6402f':v>d[i-1]?'#4a8a4a':v<d[i-1]?'#b33333':'#a6402f'; }); }
  var base={responsive:true,plugins:{legend:{display:false}},scales:{x:{ticks:{font:{size:10}}},y:{beginAtZero:true,ticks:{font:{size:10}}}}};
  var ctxR=document.getElementById('chartRev').getContext('2d');
  if(cRev){cRev.destroy();}
  cRev=new Chart(ctxR,{type:'bar',data:{labels:labels,datasets:[{data:revs,backgroundColor:bc(revs),borderColor:bbc(revs),borderWidth:1.5,borderRadius:3}]},options:{responsive:true,plugins:{legend:{display:false}},scales:{x:{ticks:{font:{size:10}}},y:{beginAtZero:true,ticks:{font:{size:10},callback:function(v){return '$'+v;}}}}}});
  var ctxC=document.getElementById('chartCnt').getContext('2d');
  if(cCnt){cCnt.destroy();}
  cCnt=new Chart(ctxC,{type:'bar',data:{labels:labels,datasets:[{data:cnts,backgroundColor:bc(cnts),borderColor:bbc(cnts),borderWidth:1.5,borderRadius:3}]},options:{responsive:true,plugins:{legend:{display:false}},scales:{x:{ticks:{font:{size:10}}},y:{beginAtZero:true,ticks:{font:{size:10},callback:function(v){return Number.isInteger(v)?v+'名':'';}}}}}});
}

document.getElementById('btnDl').onclick = function(){
  var data={students:students,snapshots:snapshots,generatedAt:new Date().toISOString()};
  var blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');
  a.href=url; a.download='student-data-'+new Date().toISOString().slice(0,10)+'.json'; a.click();
  URL.revokeObjectURL(url);
};

function render(){ saveData(); renderRows(); renderSummary(); renderGoal(); }
</script>
